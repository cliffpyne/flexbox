<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NobleUI - React Bootstrap Admin Template</title>
    <meta
      name="description"
      content="NobleUI is a modern, responsive React admin dashboard template built with Bootstrap 5, Vite, TypeScript, and reusable UI components."
    />

    <!-- Preload login hero image, logo images, so it starts loading before React bootstraps -->
    <link rel="preload" as="image" href="/images/others/auth-hero.webp" />
    <link rel="preload" as="image" href="/images/logo-mini-light.png" />
    <link rel="preload" as="image" href="/images/logo-mini-dark.png" />
  </head>
  <body>
    
    <!-- START: Setting up theme mode on page load for the splash screen -->
    <script>
      const themeMode = localStorage.getItem('theme');
      if (themeMode) {
        document.documentElement.setAttribute('data-bs-theme', themeMode);
      } else {
        document.documentElement.setAttribute('data-bs-theme', window.matchMedia('(prefers-color-scheme: dark)').matches? 'dark': 'light');
      }
    </script>
    <!-- END: Setting up theme mode on page load for the splash screen -->
     
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
