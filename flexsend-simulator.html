<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexSend — Live API Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090E;--bg1:#0D1018;--bg2:#131720;--bg3:#1A1F2C;--border:#1C2133;--border2:#252D40;--amber:#F5A623;--amber2:#FFD166;--green:#05D394;--red:#EF4565;--blue:#4CC9F0;--purple:#B5179E;--text:#E4EAF4;--muted:#4E5870;--subtle:#8090AA}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px}
.app{display:grid;grid-template-rows:50px 1fr 160px;height:100vh}

/* TOPBAR */
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;z-index:100;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-right:4px}
.logo-sq{width:26px;height:26px;background:var(--amber);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#07090E;font-weight:900;font-size:12px}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.tb-pill{display:flex;align-items:center;gap:6px;padding:3px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;font-size:11px}
.tb-label{color:var(--muted);font-size:10px}
.tb-val{color:var(--text);font-weight:600}
.tb-val.ref{color:var(--amber)}
.tb-val.pending{color:var(--amber)}
.tb-val.transit{color:var(--blue)}
.tb-val.delivered{color:var(--green)}
.tb-val.blocked{color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-a{background:var(--amber);animation:blink 1.4s infinite}
.dot-g{background:var(--green)}
.dot-r{background:var(--red);animation:blink .8s infinite}
.dot-b{background:var(--blue);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.tb-actions{margin-left:auto;display:flex;gap:6px}
.tbtn{padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--subtle);cursor:pointer;font-family:inherit;font-size:10px;transition:all .15s;letter-spacing:.03em}
.tbtn:hover{border-color:var(--amber);color:var(--amber)}
.tbtn.danger:hover{border-color:var(--red);color:var(--red);background:#EF456510}

/* MAIN */
.main{display:grid;grid-template-columns:200px 1fr 340px;overflow:hidden}

/* ACTOR SIDEBAR */
.sidebar{background:var(--bg1);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sb-head{padding:10px 12px 6px;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.actor-tab{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;position:relative}
.actor-tab:hover{background:var(--bg2)}
.actor-tab.active{background:var(--bg2);border-left-color:var(--amber)}
.actor-tab.locked{opacity:.45;cursor:not-allowed}
.av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid transparent}
.actor-info .an{font-size:11px;font-weight:600;color:var(--text)}
.actor-info .ar{font-size:9px;color:var(--muted);margin-top:1px}
.step-badge{margin-left:auto;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.step-done{background:#05D39422;color:var(--green);border:1px solid #05D39444}
.step-active{background:#F5A62322;color:var(--amber);border:1px solid #F5A62344;animation:blink 1.4s infinite}
.step-wait{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* MIDDLE */
.mid{overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.actor-hero{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.hero-av{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px}
.hero-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.hero-sub{font-size:10px;color:var(--muted);margin-top:2px}
.jwt-chip{margin-left:auto;padding:3px 8px;border:1px solid var(--border2);border-radius:3px;font-size:9px;color:var(--muted);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help}

.content{padding:14px;display:flex;flex-direction:column;gap:10px}
.slabel{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:4px 0 2px;border-bottom:1px solid var(--border);margin-top:4px}

/* Parcel info banner — shows once booked */
.parcel-banner{background:#F5A62308;border:1px solid #F5A62322;border-radius:8px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px 16px}
.pb-field{display:flex;flex-direction:column;gap:1px}
.pb-key{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.pb-val{font-size:11px;font-weight:600;color:var(--text)}
.pb-val.hi{color:var(--amber)}

/* ACTION CARDS */
.acard{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .12s}
.acard:hover{border-color:var(--border2)}
.acard.exec{border-color:var(--amber);box-shadow:0 0 0 1px #F5A62318}
.acard.ok{border-color:#05D39433}
.acard.err{border-color:#EF456533}
.ah{padding:9px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.meth{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;flex-shrink:0}
.mGET{background:#05D39418;color:var(--green);border:1px solid #05D39433}
.mPOST{background:#F5A62318;color:var(--amber);border:1px solid #F5A62333}
.mPATCH{background:#4CC9F018;color:var(--blue);border:1px solid #4CC9F033}
.ep{font-size:11px;color:var(--subtle);flex:1}
.ep b{color:var(--text)}
.adesc{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap}
.abody{padding:0 12px 12px;display:flex;flex-direction:column;gap:7px}
.abody.hide{display:none}
.frow{display:grid;gap:6px}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:5px 7px;color:var(--text);font-family:inherit;font-size:11px;outline:none;transition:border-color .12s;width:100%}
.fi:focus{border-color:var(--amber)}
.fi:disabled{opacity:.5;cursor:not-allowed}
.fi.auto{border-color:#F5A62333;color:var(--amber)}
.fsel{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:5px 7px;color:var(--text);font-family:inherit;font-size:11px;outline:none;cursor:pointer;width:100%}
.fsel:focus{border-color:var(--amber)}
.fire{width:100%;padding:7px;background:var(--amber);color:#07090E;border:none;border-radius:5px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px}
.fire:hover{background:var(--amber2)}
.fire:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed}
.fire.loading{background:#F5A62330;color:var(--amber)}
.resp{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:10px;max-height:100px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;color:var(--subtle);margin-top:4px}
.resp.ok{border-color:#05D39430;color:var(--green)}
.resp.err{border-color:#EF456530;color:var(--red)}

/* LOCKED STEP */
.locked-step{padding:24px;text-align:center;color:var(--muted);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:8px}
.lock-icon{font-size:28px}

/* QR Scanner */
.qrbox{border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s;background:var(--bg1)}
.qrbox:hover{border-color:var(--amber)}
.qrbox::after{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:scan 2.2s linear infinite;top:0;opacity:.7}
@keyframes scan{0%{top:0}100%{top:100%}}
.qr-emoji{font-size:32px;margin:6px 0}
.qr-token{font-size:10px;font-weight:700;letter-spacing:.12em;margin-top:4px}
.qr-sub{font-size:9px;color:var(--muted);margin-top:4px}
.qrbox.ready{border-color:#F5A62355;background:#F5A62308}
.qrbox.consumed{border-color:#05D39455;background:#05D39408;opacity:.8}
.qrbox.inactive{opacity:.35;cursor:not-allowed}
.qrbox.inactive::after{display:none}

/* Route selector */
.route-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.ro{padding:8px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s}
.ro:hover{border-color:var(--border2)}
.ro.sel{border-color:var(--amber);background:#F5A62310}
.ro-code{font-weight:700;font-size:11px;color:var(--amber)}
.ro-desc{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}

/* Token chain */
.tchain{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.tc-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.tc-row{display:flex;gap:4px;align-items:center}
.tc-arrow{color:var(--border2);font-size:10px}
.tok{padding:4px 7px;border-radius:4px;font-size:10px;font-weight:700;border:1px solid;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:40px;transition:all .3s}
.tok-pending{background:var(--bg);color:var(--muted);border-color:var(--border)}
.tok-active{background:#F5A62318;color:var(--amber);border-color:#F5A62355}
.tok-current{background:var(--amber);color:#07090E;border-color:var(--amber);box-shadow:0 0 8px #F5A62366;animation:glow .9s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--amber)}50%{box-shadow:0 0 18px var(--amber),0 0 28px #F5A62344}}
.tok-consumed{background:#05D39412;color:var(--green);border-color:#05D39444;opacity:.75}
.tok-sub{font-size:7px;font-weight:400;text-transform:uppercase;letter-spacing:.04em}

/* Variance indicator */
.var-bar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-top:4px}
.var-fill{height:100%;border-radius:2px;transition:width .4s,background .4s}

/* RIGHT LOG */
.logpanel{background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lph{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0}
.lp-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.lp-filters{margin-left:auto;display:flex;gap:3px}
.lf{padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:9px;transition:all .12s}
.lf.on{background:var(--bg2);border-color:var(--border2);color:var(--text)}
.logbody{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:1px}
.le{padding:4px 6px;border-radius:3px;font-size:10px;line-height:1.7;animation:pop .15s ease-out;border-left:2px solid transparent}
@keyframes pop{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:translateY(0)}}
.le-http{border-left-color:#F5A62355;background:#F5A62306}
.le-ws{border-left-color:#4CC9F055;background:#4CC9F006}
.le-ev{border-left-color:#05D39455;background:#05D39406}
.le-db{border-left-color:#B5179E55;background:#B5179E06}
.le-sys{border-left-color:var(--border);background:transparent}
.ltime{color:var(--muted)}
.ltag{padding:0 4px;border-radius:2px;font-size:9px;font-weight:700;margin:0 2px}
.tag-http{background:#F5A62320;color:var(--amber)}
.tag-ws{background:#4CC9F020;color:var(--blue)}
.tag-ev{background:#05D39420;color:var(--green)}
.tag-db{background:#B5179E20;color:var(--purple)}
.tag-sys{background:var(--bg3);color:var(--muted)}
.lpath{color:var(--blue)}
.ls2{color:var(--green)}
.ls4{color:var(--amber)}
.ls5{color:var(--red)}

/* BOTTOM */
.bottom{background:var(--bg1);border-top:1px solid var(--border);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
.bhead{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.bh-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.bh-step{font-size:9px;color:var(--muted);margin-left:6px}
.progress-scroll{overflow-x:auto;overflow-y:hidden;padding:12px 14px}
.ptrack{display:flex;align-items:flex-start;gap:0;min-width:max-content}
.pstep{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;margin:0 20px}
.pstep+.pstep::before{content:'';position:absolute;right:calc(100% + 4px);top:13px;width:40px;height:1px;background:var(--border)}
.pstep+.pstep.sdone::before{background:var(--green)}
.pstep+.pstep.sactive::before{background:linear-gradient(90deg,var(--green),var(--amber))}
.pdot{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .3s;z-index:1;font-weight:600}
.pdot.sdone{border-color:var(--green);background:#05D39415;color:var(--green)}
.pdot.sactive{border-color:var(--amber);background:#F5A62315;color:var(--amber);animation:glow .9s infinite}
.plabel{font-size:8px;color:var(--muted);text-align:center;max-width:55px;line-height:1.4}
.plabel.sdone{color:var(--green)}
.plabel.sactive{color:var(--amber)}
.glog{overflow-y:auto;padding:4px 12px;display:flex;flex-direction:column;gap:0}
.gle{display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--border);font-size:10px}
.gle .gt{color:var(--muted);flex-shrink:0;font-size:9px;min-width:54px}
.gle .ga{padding:0 5px;border-radius:2px;font-size:9px;font-weight:700;flex-shrink:0}
.gle .gm{color:var(--subtle)}
.gle.hi .gm{color:var(--text)}

/* scrollbars */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.info-box{padding:8px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;font-size:10px;color:var(--muted);line-height:1.6}
.info-box b{color:var(--text)}
.info-box.warn{background:#EF456508;border-color:#EF456530;color:#EF4565bb}
.info-box.success{background:#05D39408;border-color:#05D39430;color:#05D394bb}
.info-box.amber{background:#F5A62308;border-color:#F5A62330;color:#F5A623bb}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><div class="logo-sq">F</div>FlexSend</div>
  <div class="sep"></div>
  <div class="tb-pill"><span class="tb-label">ENV</span><span class="tb-val">sandbox.flexsend.co.tz</span></div>
  <div class="tb-pill">
    <span class="dot dot-a" id="td-dot"></span>
    <span class="tb-label">REF</span>
    <span class="tb-val ref" id="td-ref">—</span>
  </div>
  <div class="tb-pill">
    <span class="tb-label">STATUS</span>
    <span class="tb-val pending" id="td-status">AWAITING BOOKING</span>
  </div>
  <div class="tb-pill">
    <span class="tb-label">PARCEL</span>
    <span class="tb-val" id="td-parcel">—</span>
  </div>
  <div class="tb-pill">
    <span class="tb-label">ROUTE</span>
    <span class="tb-val" id="td-route">—</span>
  </div>
  <div class="tb-pill">
    <span class="tb-label">WEIGHT</span>
    <span class="tb-val" id="td-weight">—</span>
  </div>
  <div class="tb-actions">
    <button class="tbtn" onclick="resetAll()">↺ Reset</button>
    <button class="tbtn danger" onclick="injectFraud()">⚡ Fraud</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">Actors — same parcel</div>
    <div id="actor-list"></div>
  </div>

  <!-- MIDDLE -->
  <div class="mid" id="actor-panel"></div>

  <!-- LOG PANEL -->
  <div class="logpanel">
    <div class="lph">
      <span class="lp-title">Live Requests</span>
      <div class="lp-filters">
        <button class="lf on" id="f-HTTP" onclick="toggleF('HTTP')">HTTP</button>
        <button class="lf on" id="f-WS"   onclick="toggleF('WS')">WS</button>
        <button class="lf on" id="f-EV"   onclick="toggleF('EV')">EVENT</button>
        <button class="lf on" id="f-DB"   onclick="toggleF('DB')">DB</button>
      </div>
    </div>
    <div class="logbody" id="req-log"></div>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="bhead">
    <span class="bh-title">Delivery Journey</span>
    <span class="bh-step" id="step-label">Step 0 / 12</span>
    <div style="display:flex;gap:10px;margin-left:auto;align-items:center">
      <span class="dot dot-g"></span><span style="font-size:9px;color:var(--muted)">done</span>
      <span class="dot dot-a"></span><span style="font-size:9px;color:var(--muted)">active</span>
    </div>
  </div>
  <div style="display:grid;grid-template-rows:60px 1fr;overflow:hidden">
    <div class="progress-scroll"><div class="ptrack" id="ptrack"></div></div>
    <div class="glog" id="glog"></div>
  </div>
</div>

</div><!-- .app -->

<script>
// ════════════════════════════════════════════════════════
// SHARED STATE — single source of truth for the whole demo
// ════════════════════════════════════════════════════════
const S = {
  // Created at booking
  parcelId:        null,
  bookingRef:      null,
  routeCode:       'A1',
  senderName:      'Amina Hassan',
  senderPhone:     '+255712345678',
  receiverName:    'Robert Mensah',
  receiverPhone:   '+255787654321',
  category:        'ELECTRONICS',
  declaredWeight:  2.5,
  declaredValue:   150000,
  fragile:         false,
  insurance:       false,
  pickupAddress:   'Msimbazi St, Kariakoo, Dar es Salaam',
  receiverAddress: 'Mapinduzi Rd, Mwanza',

  // Set after events
  confirmedWeight: null,
  variancePct:     null,
  boxSerial:       null,
  riderId:         'rider-001',
  riderName:       'John Mwamba',
  jobId:           null,
  priceTZS:        0,
  paymentId:       null,

  // Token chain
  tokens: { L1:'pending', L2:'pending', L3:'pending', L4:'pending', L5:'pending', L6:'pending' },

  // Progress
  journeyStep: 0,

  // Flags
  paid:           false,
  riderAssigned:  false,
  riderAtSender:  false,
  officeReceived: false,
  measured:       false,
  packed:         false,
  dispatched:     false,
  lastMileSet:    false,
  delivered:      false,
  fraudFlagged:   false,

  activeActor: 'sender',
  filters: { HTTP:true, WS:true, EV:true, DB:true },
};

// ════════════════════════════════════════════════════════
// ACTORS
// ════════════════════════════════════════════════════════
const ACTORS = [
  { id:'sender',   emoji:'👤', name:'Amina Hassan',   role:'Sender',         color:'#F5A623' },
  { id:'agent',    emoji:'🏪', name:'Kariakoo Agent', role:'Agent',          color:'#B5179E' },
  { id:'rider',    emoji:'🏍', name:'John Mwamba',    role:'Pickup Rider',   color:'#4CC9F0' },
  { id:'worker',   emoji:'📦', name:'Grace Mwangi',   role:'Office Worker',  color:'#05D394' },
  { id:'manager',  emoji:'🏢', name:'David Osei',     role:'Office Manager', color:'#FFD166' },
  { id:'ops',      emoji:'🌍', name:'Admin Flex',     role:'Ops Admin',      color:'#EF4565' },
  { id:'receiver', emoji:'📬', name:'Robert Mensah',  role:'Receiver',       color:'#05D394' },
];

const STEPS = [
  { label:'OTP\nLogin',         actor:'sender'   },
  { label:'Book\nParcel',       actor:'sender'   },
  { label:'Payment\nConfirmed', actor:'sender'   },
  { label:'Rider\nAssigned',    actor:'ops'      },
  { label:'Rider\nPickup',      actor:'rider'    },

function ts(){ return new Date().toISOString().slice(11,23); }

function logReq(type, method, path, status, detail=''){
  if(!S.filters[type]) return;
  const le = document.getElementById('req-log');
  const cls = {HTTP:'le-http',WS:'le-ws',EV:'le-ev',DB:'le-db',SYS:'le-sys'}[type]||'le-sys';
  const tagCls = {HTTP:'tag-http',WS:'tag-ws',EV:'tag-ev',DB:'tag-db',SYS:'tag-sys'}[type]||'tag-sys';
  const sCls = !status?'':status>=500?'ls5':status>=400?'ls4':'ls2';
  le.innerHTML += `<div class="le ${cls}">
    <span class="ltime">${ts()}</span>
    <span class="ltag ${tagCls}">${type}</span>
    ${method?`<span style="color:var(--amber);font-weight:700">${method}</span>`:''}
    <span class="lpath">${path}</span>
    ${status?`<span class="${sCls}">${status}</span>`:''}
    ${detail?`<br><span style="color:var(--muted);padding-left:6px;font-size:9px">${detail}</span>`:''}
  </div>`;
  le.scrollTop = le.scrollHeight;
}

function logG(actor, msg, hi=false){
  const el = document.getElementById('glog');
  const a = ACTORS.find(x=>x.id===actor)||{emoji:'⚙',name:'System',color:'#4E5870'};
  el.innerHTML += `<div class="gle${hi?' hi':''}">
    <span class="gt">${ts()}</span>
    <span class="ga" style="background:${a.color}1A;color:${a.color}">${a.emoji} ${a.name.split(' ')[0]}</span>
    <span class="gm">${msg}</span>
  </div>`;
  el.scrollTop = el.scrollHeight;
}

function toggleF(type){
  S.filters[type] = !S.filters[type];
  document.getElementById('f-'+type).classList.toggle('on', S.filters[type]);
}

// JOURNEY PROGRESS
// ════════════════════════════════════════════════════════
function renderProgress(){
  const t = document.getElementById('ptrack');
  t.innerHTML = '';
  STEPS.forEach((step, i) => {
    const cls = i < S.journeyStep ? 'sdone' : i===S.journeyStep ? 'sactive' : '';
    t.innerHTML += `<div class="pstep ${cls}">
      <div class="pdot ${cls}">${i < S.journeyStep ? '✓' : i+1}</div>
      <div class="plabel ${cls}">${step.label}</div>
    </div>`;
  });
  document.getElementById('step-label').textContent = `Step ${S.journeyStep} / ${STEPS.length}`;
}

function advance(){ if(S.journeyStep < STEPS.length) S.journeyStep++; renderProgress(); }

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function acard(id, method, path, desc, fields, onFire, btnLabel='▶ Send Request'){
  return `<div class="acard" id="card-${id}">
    <div class="ah" onclick="toggleCard('${id}')">
      <span class="meth m${method}">${method}</span>

  </div>`;
}

function openCard(id){ document.getElementById('body-'+id)?.classList.remove('hide'); }
function toggleCard(id){ document.getElementById('body-'+id)?.classList.toggle('hide'); }

function setResp(id, data, err=false){
  const el = document.getElementById('res-'+id);
  if(!el) return;
  el.style.display = 'block';
  el.className = 'resp ' + (err?'err':'ok');
  el.textContent = typeof data==='string'?data:JSON.stringify(data,null,2);
}

function setBtnLoad(id, loading){
  const b = document.getElementById('btn-'+id);
  if(!b) return;
  b.innerHTML = loading ? '<span class="spinner"></span> Sending…' : '▶ Send Request';
  b.classList.toggle('loading', loading);
  b.disabled = loading;
}

// ════════════════════════════════════════════════════════
// ACTOR SIDEBAR
// ════════════════════════════════════════════════════════
function actorStepStatus(id){
  // Which step range each actor "owns"
  const ownedSteps = {
    sender:[0,1,2], agent:[], rider:[4,5,10], worker:[6,7], manager:[8], ops:[3,9], receiver:[11]
  };
  const steps = ownedSteps[id]||[];
  if(steps.length===0) return 'none';
  const maxDone = Math.max(...steps);
  const minNeeded = Math.min(...steps);
  if(S.journeyStep > maxDone) return 'done';
  if(S.journeyStep >= minNeeded) return 'active';
  return 'wait';
}

function renderSidebar(){
  const list = document.getElementById('actor-list');
  list.innerHTML = ACTORS.map(a => {
    const st = actorStepStatus(a.id);
    const badgeCls = st==='done'?'step-done':st==='active'?'step-active':'step-wait';
    const badgeTxt = st==='done'?'✓':st==='active'?'●':'–';
    return `<div class="actor-tab ${a.id===S.activeActor?'active':''}" id="atab-${a.id}" onclick="switchActor('${a.id}')">
      <div class="av" style="background:${a.color}18;border-color:${a.color}44">${a.emoji}</div>
      <div class="actor-info">
        <div class="an">${a.name}</div>
        <div class="ar">${a.role}</div>
      </div>
      <div class="step-badge ${badgeCls}">${badgeTxt}</div>
    </div>`;
  }).join('');
}

function switchActor(id){
  S.activeActor = id;
  renderSidebar();
  renderPanel(id);
}

// HELPERS

function calcPrice(){
  const base = 5000;
  const wt = S.declaredWeight||2.5;
  const mult = wt<=1?1:wt<=3?1.8:wt<=5?2.5:wt<=10?3.2:4.0;
  let p = base * mult;
  if(S.insurance) p *= 1.02;
  if(S.fragile) p += 2000;
  S.priceTZS = Math.round(p);
  return S.priceTZS.toLocaleString();
}

function liveVariance(){
  const el = document.getElementById('var-box');
  if(!el) return;
  const confirmed = parseFloat(document.getElementById('wm-wt')?.value||'0');
  const declared  = S.declaredWeight||2.5;
  if(!confirmed||confirmed<=0){ el.innerHTML=''; return; }
  const pct = Math.abs((confirmed-declared)/declared)*100;
  const color = pct<10?'var(--green)':pct<20?'var(--amber)':'var(--red)';
  const label = pct<10?'CONFIRMED':pct<20?'REPRICING TRIGGERED':'FRAUD FLAG';
  const finalLabel = pct<10?'CONFIRMED':pct<20?'REPRICING TRIGGERED':'FRAUD FLAG';
  el.innerHTML = `<div style="padding:6px 8px;border-radius:4px;border:1px solid ${color}44;background:${color}10;color:${color};font-size:10px;font-weight:600">
    ${finalLabel} — ${pct.toFixed(1)}% variance (declared ${declared}kg → confirmed ${confirmed}kg)
    <div class="var-bar"><div class="var-fill" style="width:${Math.min(100,pct*4)}%;background:${color}"></div></div>
  </div>`;
}

function refreshCurrentPanel(){ renderPanel(S.activeActor); }
function refreshTokens(){
  document.querySelectorAll('.tchain').forEach(el=>{
    const labels={L1:'Sender',L2:'Office',L3:'Seal',L4:'Open',L5:'Mile',L6:'Delivery'};
    const toks=['L1','L2','L3','L4','L5','L6'].map((t,i)=>{
      const st=S.tokens[t];
      const cls=st==='current'?'tok-current':st==='consumed'?'tok-consumed':st==='active'?'tok-active':'tok-pending';
      return `${i>0?'<span class="tc-arrow">›</span>':''}<div class="tok ${cls}">${t}<div class="tok-sub">${labels[t]}</div></div>`;
    }).join('');
    el.innerHTML=`<div class="tc-title">Custody Token Chain — ${S.bookingRef||'no parcel yet'}</div><div class="tc-row">${toks}</div>`;
  });
}

async function wMeasure(){
  if(!S.officeReceived){setResp('w-meas','Receive parcel first',true);return;}
  setBtnLoad('w-meas',true);
  const confirmed = parseFloat(document.getElementById('wm-wt')?.value||String(S.declaredWeight));
  const variance  = Math.abs((confirmed-S.declaredWeight)/S.declaredWeight)*100;
  S.confirmedWeight = confirmed;
  S.variancePct = variance;
  await delay(900);

  const result = variance<10?'CONFIRMED':variance<20?'REPRICING_TRIGGERED':'FRAUD_FLAGGED';
  logReq('HTTP','POST',`/parcels/${S.parcelId.slice(0,12)}/measurement`,200,`{"confirmed_weight_kg":${confirmed}}`);
  logReq('DB','','→ UPDATE parcels SET confirmed_weight_kg='+confirmed,'');
  logReq('DB','','→ INSERT parcel_events (PARCEL_MEASUREMENT_CONFIRMED)','');
  if(result==='REPRICING_TRIGGERED'){
    logReq('EV','','→ PARCEL_REPRICING_TRIGGERED published','');
    logReq('DB','','→ STK push to '+S.senderPhone+' for TZS 3,500 difference','');
    setStatus('REPRICING','blocked');
  } else if(result==='FRAUD_FLAGGED'){
    S.fraudFlagged=true;
    logReq('EV','','→ PARCEL_FRAUD_FLAGGED published','');
    logReq('EV','','→ ML_ALERT_LEVEL_4 raised','');
    setStatus('FRAUD FLAGGED','blocked');
  } else {
    logReq('EV','','→ PARCEL_MEASUREMENT_CONFIRMED published','');
  }
  S.measured=true;
  setResp('w-meas',{success:true,result,declared_kg:S.declaredWeight,confirmed_kg:confirmed,variance_pct:variance.toFixed(1)+'%'});
  updateTop(); refreshTokens();
  logG('worker',`Measured: ${confirmed}kg vs declared ${S.declaredWeight}kg → ${result}`,result!=='CONFIRMED');
  if(result==='CONFIRMED') advance();
  setBtnLoad('w-meas',false);
}

async function mgRouteSwitch(){
  setBtnLoad('mg-route',true);
  const emergency = document.getElementById('mg-emg')?.value==='true';
  const newRoute  = document.getElementById('mg-nrt')?.value;
  await delay(800);
  if(!emergency){
    logReq('HTTP','POST',`/parcels/${S.parcelId?.slice(0,12)||'N/A'}/route-switch`,423,'');
    logReq('DB','','→ Lock check: route locked after LAST_MILE_RIDER_DISPATCHED','');
    setResp('mg-route',{success:false,code:'ROUTE_LOCKED',message:'Set emergency=true (OPS_ADMIN only) to override'},true);
  } else {
    logReq('HTTP','POST',`/parcels/${S.parcelId?.slice(0,12)}/route-switch`,200,'{"emergency":true}');
    for(let i=1;i<=9;i++){
      await delay(100);
      const steps=['Cancel active jobs','Update route_code','Recalculate price','Cancel stale tokens','Issue new tokens','Notify pickup rider','Notify sender','Notify receiver','Publish ROUTE_SWITCH_EXECUTED'];
      logReq('DB','',`→ Step ${i}/9: ${steps[i-1]}`,'');
    }
    setResp('mg-route',{success:true,new_route:newRoute,steps_completed:9,parcel:S.bookingRef});
    logG('manager',`Route switch → ${newRoute} (9 atomic steps ✓)`,true);
  }
  setBtnLoad('mg-route',false);
}
